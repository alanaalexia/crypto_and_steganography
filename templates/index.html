<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto & Stegano Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-lg">
        <h1 class="text-2xl font-bold mb-6 text-center text-indigo-600">🔐 Crypto & Stegano Suite</h1>
        
        <div class="border-b mb-6 pb-2 flex justify-center space-x-8">
            <button id="tab-crypto" onclick="switchTab('crypto')" class="font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">Criptografia</button>
            <button id="tab-stego" onclick="switchTab('stego')" class="font-bold text-gray-400 hover:text-indigo-500 pb-1">Esteganografia</button>
        </div>

        <div id="cryptoSection" class="space-y-4">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Arquivo (até 500MB)</label>
                    <input type="file" id="file" class="w-full border p-2 rounded mt-1">
                </div>
                
                <div id="passwordContainer">
                    <label class="block text-sm font-medium text-gray-700">Chave/Senha (8 ou 128 chars)</label>
                    <input type="text" id="password" class="w-full border p-2 rounded mt-1" placeholder="Digite sua senha">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Método</label>
                    <select id="method" class="w-full border p-2 rounded mt-1">
                    <option value="symmetric">Simétrica (AES-GCM)</option>
                    <option value="asymmetric">Assimétrica (RSA Híbrida)</option>
                </select>
                </div>

                <div id="privateKeyUpload" class="hidden p-3 bg-red-50 border border-red-200 rounded">
                    <label class="block text-sm font-medium text-red-600">Sua Chave Privada (.txt)</label>
                    <input type="file" id="keyFile" class="w-full border p-2 rounded border-red-200 bg-white">
                    <p class="text-[10px] text-red-500 mt-1">* Necessária apenas para descriptografia assimétrica.</p>
                </div>

                <div class="flex space-x-2">
                    <button onclick="runCrypto('encrypt')" class="flex-1 bg-indigo-600 text-white py-2 rounded font-semibold hover:bg-indigo-700 transition">
                        Criptografar
                    </button>
                    <button onclick="runCrypto('decrypt')" class="flex-1 bg-gray-600 text-white py-2 rounded font-semibold hover:bg-gray-700 transition">
                        Descriptografar
                    </button>
                </div>
            </div>
        </div>

        <div id="stegoSection" class="hidden space-y-4">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Imagem de Fundo (Carrier PNG)</label>
                    <input type="file" id="stegoImage" class="w-full border p-2 rounded mt-1" accept="image/png">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Arquivo para Esconder</label>
                    <input type="file" id="fileToHide" class="w-full border p-2 rounded mt-1">
                </div>

                <div class="flex space-x-2">
                    <button onclick="runStego('hide')" class="flex-1 bg-green-600 text-white py-2 rounded font-semibold hover:bg-green-700 transition">
                        Esconder (Hide)
                    </button>
                    <button onclick="runStego('reveal')" class="flex-1 bg-yellow-600 text-white py-2 rounded font-semibold hover:bg-yellow-700 transition">
                        Revelar (Reveal)
                    </button>
                </div>
            </div>
        </div>

        <div id="loading" class="mt-4 hidden text-center text-sm text-gray-500 animate-pulse">
            Processando... por favor aguarde.
        </div>

        <div id="result" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded">
            <p class="text-green-700 font-bold">✅ Sucesso!</p>
            <p id="timeResult" class="text-sm text-green-600 font-medium"></p>
            <div class="flex flex-col space-y-2 mt-3">
                <a id="downloadLink" href="#" class="text-indigo-600 underline text-sm font-bold">⬇️ Baixar Resultado</a>
                <a id="keyDownloadLink" href="#" class="hidden text-red-600 underline text-sm font-bold">🔑 Baixar Chave Privada (SALVE ISTO!)</a>
            </div>
        </div>
    </div>

    <script>
    // 1. Lógica para mostrar o campo da chave apenas quando necessário (O que você pediu)
    document.getElementById('method').addEventListener('change', function() {
        const isAsymmetric = this.value === 'asymmetric';
        const passContainer = document.getElementById('passwordContainer');
        const keyUpload = document.getElementById('privateKeyUpload');

        if (isAsymmetric) {
            passContainer.classList.add('hidden'); // Esconde senha
            keyUpload.classList.remove('hidden'); // Mostra upload de chave
        } else {
            passContainer.classList.remove('hidden'); // Mostra senha
            keyUpload.classList.add('hidden');       // Esconde upload de chave
        }
    });

    // 2. Lógica de Alternar Abas (Crypto / Stego)
    function switchTab(tab) {
        const cryptoSection = document.getElementById('cryptoSection');
        const stegoSection = document.getElementById('stegoSection');
        const tabCrypto = document.getElementById('tab-crypto');
        const tabStego = document.getElementById('tab-stego');
        
        document.getElementById('result').classList.add('hidden');

        if (tab === 'crypto') {
            cryptoSection.classList.remove('hidden');
            stegoSection.classList.add('hidden');
            tabCrypto.className = "font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1";
            tabStego.className = "font-bold text-gray-400 hover:text-indigo-500 pb-1";
        } else {
            stegoSection.classList.remove('hidden');
            cryptoSection.classList.add('hidden');
            tabStego.className = "font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1";
            tabCrypto.className = "font-bold text-gray-400 hover:text-indigo-500 pb-1";
        }
    }

    // 3. Executar Criptografia/Decriptografia
    async function runCrypto(action) {
        const file = document.getElementById('file').files[0];
        const method = document.getElementById('method').value;
        
        if (!file) return alert("Selecione um arquivo!");
        
        showLoading(true);
        const formData = new FormData();
        formData.append('action', action);
        formData.append('file', file);
        formData.append('method', method);

        if (method === 'symmetric') {
            const password = document.getElementById('password').value;
            if (!password) { showLoading(false); return alert("Digite a senha!"); }
            formData.append('password', password);
        } else if (action === 'decrypt') {
            const keyFile = document.getElementById('keyFile').files[0];
            if (!keyFile) { showLoading(false); return alert("Selecione o arquivo de chave privada!"); }
            formData.append('key_file', keyFile);
        }

        try {
            const res = await fetch('/crypt_action', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.status === 'success') {
                showResult(data.time, data.download_url);
                // Se o servidor enviou uma URL de chave (no caso de encrypt asymmetric)
                if (data.key_url) {
                    const kLink = document.getElementById('keyDownloadLink');
                    kLink.href = data.key_url;
                    kLink.classList.remove('hidden');
                }
            } else {
                alert("Erro: " + data.message);
            }
        } catch (err) {
            alert("Erro na conexão.");
        } finally {
            showLoading(false);
        }
    }

    // 4. Esteganografia
    async function runStego(action) {
        const imageFile = document.getElementById('stegoImage').files[0];
        if (!imageFile) return alert("Selecione uma imagem!");

        showLoading(true);
        const formData = new FormData();
        formData.append('action', action);
        formData.append('image', imageFile);

        if (action === 'hide') {
            const fileToHide = document.getElementById('fileToHide').files[0];
            if (!fileToHide) { showLoading(false); return alert("Selecione o arquivo para esconder!"); }
            formData.append('file_to_hide', fileToHide);
        }

        try {
            const res = await fetch('/steganography', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.status === 'success') showResult(data.time, data.download_url);
            else alert("Erro: " + data.message);
        } catch (err) {
            alert("Erro no processamento.");
        } finally {
            showLoading(false);
        }
    }

    function showLoading(state) {
        document.getElementById('loading').classList.toggle('hidden', !state);
        document.getElementById('result').classList.add('hidden');
        document.getElementById('keyDownloadLink').classList.add('hidden');
    }

    function showResult(time, url) {
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('timeResult').innerText = "Tempo de execução: " + time;
        document.getElementById('downloadLink').href = url;
    }
    </script>
</body>
</html>
