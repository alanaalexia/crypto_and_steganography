<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto & Stegano Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6 text-slate-800">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-3xl">
        <h1 class="text-3xl font-black mb-8 text-center text-indigo-600 tracking-tight">🐍 CHAMBER OF SECRETS 🐍</h1>
        
        <div class="flex space-x-2 mb-8 bg-slate-100 p-1 rounded-xl">
            <button onclick="switchTab('symmetric')" id="tab-symmetric" class="flex-1 py-2 rounded-lg font-bold transition-all bg-white shadow text-indigo-600">SIMÉTRICA</button>
            <button onclick="switchTab('asymmetric')" id="tab-asymmetric" class="flex-1 py-2 rounded-lg font-bold transition-all text-slate-500 hover:text-indigo-600">ASSIMÉTRICA</button>
            <button onclick="switchTab('stego')" id="tab-stego" class="flex-1 py-2 rounded-lg font-bold transition-all text-slate-500 hover:text-indigo-600">ESTEGANOGRAFIA</button>
        </div>

        <div id="section-symmetric" class="space-y-6">
            <div class="grid gap-4">
                <div>
                    <label class="text-sm font-bold text-slate-500">ARQUIVO ORIGINAL</label>
                    <input type="file" id="file-sym" class="w-full mt-1 border-2 border-slate-100 p-2 rounded-lg">
                </div>
                <div>
                    <label class="text-sm font-bold text-slate-500">SENHA AES</label>
                    <input type="password" id="pass-sym" class="w-full mt-1 border-2 border-slate-100 p-3 rounded-lg focus:border-indigo-500 outline-none" placeholder="Digite a senha (ex: 8 ou 128 chars)">
                </div>
                <div class="flex gap-4">
                    <button onclick="runCrypto('symmetric', 'encrypt')" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">CRIPTOGRAFAR</button>
                    <button onclick="runCrypto('symmetric', 'decrypt')" class="flex-1 bg-slate-700 text-white py-3 rounded-xl font-bold hover:bg-slate-800">DESCRIPTOGRAFAR</button>
                </div>
            </div>
        </div>

        <div id="section-asymmetric" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Chave Pública</label>
                    <textarea id="pub-key" readonly class="w-full h-24 mt-1 p-2 bg-slate-50 border rounded-lg text-[10px] font-mono break-all"></textarea>
                    <button onclick="copy('pub-key')" class="absolute top-6 right-2 text-xs bg-white px-2 py-1 border rounded shadow hover:bg-indigo-50">COPIAR</button>
                </div>
                <div class="relative">
                    <label class="text-[10px] font-black text-red-400 uppercase">Chave Privada (🔒 SIGILO)</label>
                    <textarea id="priv-key" readonly class="w-full h-24 mt-1 p-2 bg-red-50 border border-red-100 rounded-lg text-[10px] font-mono break-all text-red-800"></textarea>
                    <button onclick="copy('priv-key')" class="absolute top-6 right-2 text-xs bg-white px-2 py-1 border rounded shadow hover:bg-red-50">COPIAR</button>
                </div>
            </div>
            <button onclick="generateKeys()" class="w-full py-2 bg-slate-100 rounded-lg text-xs font-bold hover:bg-slate-200 transition">✨ GERAR NOVO PAR DE CHAVES RSA</button>

            <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-100 space-y-4">
                <input type="file" id="file-asym" class="w-full border-2 border-white p-2 rounded-lg bg-white">
                <div>
                    <label class="text-sm font-bold text-indigo-900">COLE A CHAVE AQUI</label>
                    <textarea id="key-input" class="w-full h-20 mt-1 p-3 border-2 border-white rounded-lg text-[10px] font-mono outline-none focus:border-indigo-300" placeholder="Cole a chave pública para criptografar ou a privada para descriptografar..."></textarea>
                </div>
                <div class="flex gap-4">
                    <button onclick="runCrypto('asymmetric', 'encrypt')" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">CRIPTOGRAFAR</button>
                    <button onclick="runCrypto('asymmetric', 'decrypt')" class="flex-1 bg-slate-700 text-white py-3 rounded-xl font-bold hover:bg-slate-800">DESCRIPTOGRAFAR</button>
                </div>
            </div>
        </div>

        <div id="section-stego" class="hidden space-y-6">
                <div>
                    <label class="text-sm font-bold text-slate-500">IMAGEM DE FUNDO (PNG)</label>
                    <input type="file" id="file-sym" class="w-full mt-1 border-2 border-slate-100 p-2 rounded-lg">
                </div>
                <div>
                    <label class="text-sm font-bold text-slate-500">ARQUIVO PARA ESCONDER</label>
                    <input type="file" id="file-sym" class="w-full mt-1 border-2 border-slate-100 p-2 rounded-lg">
                </div>
                <div class="flex gap-4">
                    <button onclick="runCrypto('symmetric', 'encrypt')" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700">ESCONDER</button>
                    <button onclick="runCrypto('symmetric', 'encrypt')" class="flex-1 bg-slate-700 text-white py-3 rounded-xl font-bold hover:bg-slate-800">REVELAR</button>
                </div>
        </div>

        <div id="loading" class="mt-6 hidden text-center text-indigo-600 font-bold animate-pulse">⚙️ PROCESSANDO...</div>
        <div id="result" class="mt-6 hidden p-6 bg-slate-800 text-white rounded-2xl shadow-inner">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-emerald-400 font-black">SUCESSO!</p>
                    <p id="time-display" class="text-xs text-slate-400"></p>
                </div>
                <a id="down-link" href="#" class="bg-indigo-500 hover:bg-indigo-400 px-6 py-2 rounded-lg font-bold text-sm transition">BAIXAR ARQUIVO</a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            ['symmetric', 'asymmetric', 'stego'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "flex-1 py-2 rounded-lg font-bold transition-all text-slate-500 hover:text-indigo-600";
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "flex-1 py-2 rounded-lg font-bold transition-all bg-white shadow text-indigo-600";
            document.getElementById('result').classList.add('hidden');
        }

        async function generateKeys() {
            const res = await fetch('/generate_keys');
            const data = await res.json();
            document.getElementById('pub-key').value = data.public_key;
            document.getElementById('priv-key').value = data.private_key;
        }

        function copy(id) {
            const el = document.getElementById(id);
            el.select();
            navigator.clipboard.writeText(el.value);
            alert("Chave copiada!");
        }

        async function runCrypto(method, action) {
            const file = document.getElementById(method === 'symmetric' ? 'file-sym' : 'file-asym').files[0];
            if(!file) return alert("Selecione o arquivo!");
            
            const fd = new FormData();
            fd.append('file', file);
            fd.append('method', method);
            fd.append('action', action);

            if(method === 'symmetric') fd.append('password', document.getElementById('pass-sym').value);
            else fd.append('key_text', document.getElementById('key-input').value);

            processRequest('/crypt_action', fd);
        }

        async function runStego(action) {
            const img = document.getElementById('stego-img').files[0];
            if(!img) return alert("Selecione a imagem!");
            const fd = new FormData();
            fd.append('image', img);
            fd.append('action', action);
            if(action === 'hide') fd.append('file_to_hide', document.getElementById('stego-file').files[0]);
            processRequest('/steganography', fd);
        }

        async function processRequest(url, fd) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            try {
                const res = await fetch(url, { method: 'POST', body: fd });
                const data = await res.json();
                if(data.status === 'success') {
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('time-display').innerText = "Processamento: " + data.time;
                    document.getElementById('down-link').href = data.download_url;
                } else alert(data.message);
            } catch(e) { alert("Erro de conexão."); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }
    </script>
</body>
</html>
